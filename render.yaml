services:
  - type: web
    name: my-portfolio
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix server && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_INBOX
        sync: false
      - key: CONTACT_FROM
        sync: false
